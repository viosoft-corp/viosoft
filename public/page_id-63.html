<script>/* __WP_STATIC_SHIM__ */
(function(){
  /* Stub wp-json REST API so 404s don't spam the console */
  var _fetch = window.fetch;
  window.fetch = function(input, init) {
    var url = typeof input === 'string' ? input : (input && input.url) || '';
    if (url.indexOf('/wp-json/') !== -1 ||
        url.indexOf('/wp-admin/admin-ajax.php') !== -1 ||
        url.indexOf('/cdn-cgi/rum') !== -1 ||
        url.indexOf('cloudflareinsights.com') !== -1) {
      return Promise.resolve(new Response('', {status:204}));
    }
    return _fetch.apply(this, arguments);
  };

  /* Stub WP Heartbeat API */
  window.wp = window.wp || {};
  window.wp.heartbeat = window.wp.heartbeat || {
    interval: function(){}, connect: function(){}, enqueue: function(){},
    dequeue: function(){}, isActive: function(){return false;}
  };

  /* Block wp-admin redirects from broken nonces */
  window.ajaxurl = window.ajaxurl || '';
  window.wpApiSettings = window.wpApiSettings || {root:'', nonce:''};

  /* Stub navigator.sendBeacon so Cloudflare RUM never POSTs to /cdn-cgi/rum */
  if (navigator.sendBeacon) {
    var _beacon = navigator.sendBeacon.bind(navigator);
    navigator.sendBeacon = function(url, data) {
      if (url && (url.indexOf('/cdn-cgi/') !== -1 ||
                  url.indexOf('cloudflare') !== -1 ||
                  url.indexOf('rum') !== -1)) {
        return true;  // silently discard
      }
      return _beacon(url, data);
    };
  }
})();
</script>

<!-- Viosoft Form → Google Space via Apps Script -->
<script>
(function() {
  var EP = "https://script.google.com/macros/s/AKfycbzgfSxDxVRhBbv_JNzYjYmQI0U8Rsh64YO13Es1OMVTQywDEFv2Y0Og3y7aQpbN7_NErA/exec";
  var MAX = 3500;

  function fv(form, name) {
    var el = form.elements[name];
    return el ? el.value.trim() : "";
  }

  function showMsg(form, msg, isErr) {
    var id = "vio-msg-" + (form.id || "cf");
    var el = document.getElementById(id);
    if (!el) {
      el = document.createElement("div");
      el.id = id;
      el.style.cssText = "margin-top:12px;padding:10px 14px;border-radius:6px;font-size:14px;font-weight:600;";
      form.parentNode.insertBefore(el, form.nextSibling);
    }
    el.style.background = isErr ? "#fde8e8" : "#e8f9e8";
    el.style.color = isErr ? "#c0392b" : "#1a7a1a";
    el.style.border = isErr ? "1px solid #f5c6c6" : "1px solid #b8e8b8";
    el.textContent = msg;
  }

  function restoreBtn(btn, lbl) {
    if (!btn) return;
    btn.disabled = false;
    btn.style.opacity = "";
    if (btn.tagName === "INPUT") btn.value = lbl;
    else btn.textContent = lbl;
  }

  /* POST one chunk; return the fetch promise */
  function postChunk(payload) {
    return fetch(EP, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(payload)
    });
  }

  function sendForm(payload, form, btn, lbl) {
    var msg = payload.message || "";
    var chunks = [];

    /* Split long messages into 3500-char chunks */
    while (msg.length > 0) {
      chunks.push(msg.slice(0, MAX));
      msg = msg.slice(MAX);
    }

    payload.message = chunks[0] || "";
    payload.source = "Viosoft Corp — " + (payload.formType || "Contact Form");
    delete payload.formType;

    postChunk(payload)
      .then(function() {
        /* Send remaining chunks as follow-up posts in sequence */
        var chain = Promise.resolve();
        for (var i = 1; i < chunks.length; i++) {
          (function(i) {
            chain = chain.then(function() {
              return postChunk({
                type: "follow-up",
                source: payload.source,
                page: payload.page,
                name: payload.name,
                email: payload.email,
                message: "[Part " + (i + 1) + "/" + chunks.length + "] " + chunks[i],
                timestamp: new Date().toISOString()
              });
            });
          })(i);
        }
        return chain;
      })
      .then(function() {
        showMsg(form, "✅ Message sent! We will get back to you soon.", false);
        form.reset();
        restoreBtn(btn, lbl);
      })
      .catch(function() {
        showMsg(form, "❌ Could not send. Please email info@viosoft.com directly.", true);
        restoreBtn(btn, lbl);
      });
  }

  /* ── Contact Form 7 ─────────────────────────────────────── */
  function initCF7() {
    var cf7 = document.querySelector("form.wpcf7-form");
    if (!cf7) { setTimeout(initCF7, 600); return; }
    cf7.addEventListener("submit", function(e) {
      e.preventDefault();
      e.stopImmediatePropagation();
      var btn = cf7.querySelector("[type=submit]");
      var lbl = btn ? (btn.value || btn.textContent) : "Submit";
      if (btn) {
        btn.disabled = true;
        btn.style.opacity = "0.7";
        if (btn.tagName === "INPUT") btn.value = "Sending…";
        else btn.textContent = "Sending…";
      }
      var payload = {
        type: "contact",
        formType: "Contact Form",
        page: window.location.href,
        name: fv(cf7, "your-name"),
        email: fv(cf7, "your-email"),
        message: fv(cf7, "your-message"),
        timestamp: new Date().toISOString()
      };
      if (!payload.email || !payload.message) {
        showMsg(cf7, "Please fill in your email and message.", true);
        restoreBtn(btn, lbl);
        return;
      }
      sendForm(payload, cf7, btn, lbl);
    }, true);
  }

  /* ── WordPress Comment Form ─────────────────────────────── */
  function initComment() {
    var cf = document.getElementById("commentform");
    if (!cf) return;
    cf.addEventListener("submit", function(e) {
      e.preventDefault();
      e.stopImmediatePropagation();
      var btn = cf.querySelector("[name=submit],[type=submit]");
      var lbl = btn ? (btn.value || btn.textContent) : "Post Comment";
      if (btn) {
        btn.disabled = true;
        btn.style.opacity = "0.7";
        if (btn.tagName === "INPUT") btn.value = "Sending…";
        else btn.textContent = "Sending…";
      }
      var siteUrl = "viosoft-corp.github.io/viosoft";
      var commenterSite = fv(cf, "url");
      var commentBody = fv(cf, "comment");
      var siteUrl = "viosoft-corp.github.io/viosoft";
      var commenterSite = fv(cf, "url");
      var commentBody = fv(cf, "comment");
      var fullMessage = (commenterSite ? "Website: " + commenterSite + "\n" : "")
        + "Site: " + siteUrl + "\n"
        + "Page: " + window.location.href + "\n\n"
        + commentBody;
      var payload = {
        type: "contact",
        formType: "Blog Comment",
        page: window.location.href,
        name: fv(cf, "author"),
        email: fv(cf, "email"),
        message: fullMessage,
        timestamp: new Date().toISOString()
      };
      if (!payload.email || !payload.message) {
        showMsg(cf, "Please fill in your email and comment.", true);
        restoreBtn(btn, lbl);
        return;
      }
      sendForm(payload, cf, btn, lbl);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function() { initCF7(); initComment(); });
  } else {
    initCF7();
    initComment();
  }
})();
</script>
